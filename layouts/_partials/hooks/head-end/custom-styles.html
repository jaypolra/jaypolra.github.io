<style>
/* ========================
   COLOR PALETTE — Light
   ======================== */
a { color: #5B3FA0; }
a:hover { color: #14285A; }
.btn-primary { background-color: #14285A; border-color: #14285A; }
.btn-primary:hover { background-color: #5B3FA0; border-color: #5B3FA0; }

/* ========================
   DARK MODE
   ======================== */
html.dark a { color: #B8A5E0; }
html.dark a:hover { color: #D4C8F0; }

/* Social icons — white in dark mode */
html.dark .resume-biography a svg,
html.dark .resume-biography a .w-6,
html.dark .resume-biography a .h-6,
html.dark .resume-biography [class*="social"] svg,
html.dark .resume-biography a[href*="linkedin"] svg,
html.dark .resume-biography a[href*="github"] svg,
html.dark .resume-biography a[href*="mailto"] svg,
html.dark .resume-biography a[href*="datascienceportfol"] svg {
  color: #ffffff !important;
  fill: #ffffff !important;
  stroke: #ffffff !important;
}
html.dark .resume-biography a[class*="rounded"] {
  border-color: rgba(255,255,255,0.3) !important;
  color: #ffffff !important;
}
html.dark .resume-biography a[class*="rounded"]:hover {
  border-color: #B8A5E0 !important;
  background: rgba(184,165,224,0.1) !important;
}
html.dark h2, html.dark h3 { color: #E8E4F0 !important; }
html.dark .moved-section h3 { color: #E8E4F0 !important; }
html.dark .page-body:has(.resume-biography) > *:first-child a[href*="uploads"] {
  background-color: #5B3FA0 !important;
}
html.dark .page-body:has(.resume-biography) > *:first-child a[href*="uploads"]:hover {
  background-color: #7B5FC0 !important;
}

/* ========================
   SIDEBAR LAYOUT — homepage only
   ======================== */
@media (min-width: 1024px) {

  .page-body:has(.resume-biography) {
    display: grid !important;
    grid-template-columns: 32% 1fr !important;
    align-items: start !important;
    gap: 0 !important;
  }

  /* ── Left sidebar — sticky, NO scroll ── */
  .page-body:has(.resume-biography) > *:first-child {
    position: sticky !important;
    top: 52px !important;
    height: calc(100vh - 52px) !important;
    overflow: hidden !important;
    grid-column: 1 !important;
    grid-row: 1 / span 999 !important;
    background: transparent !important;
  }

  /* Scale sidebar content to fit at 100% zoom (matches 80% zoom look) */
  .page-body:has(.resume-biography) > *:first-child .resume-biography {
    zoom: 0.82 !important;
    padding: 1.5rem 2rem 1rem 2rem !important;
  }

  /* Kill gradient bg */
  .page-body:has(.resume-biography) > *:first-child .hbx-bg-gradient,
  .page-body:has(.resume-biography) > *:first-child.hbx-bg-gradient {
    background: none !important;
    background-image: none !important;
  }
  .page-body:has(.resume-biography) > *:first-child .home-section-bg {
    display: none !important;
  }

  /* Force single column inside bio grid */
  .page-body:has(.resume-biography) > *:first-child .resume-biography > div > div {
    grid-template-columns: 1fr !important;
    gap: 0.5rem !important;
  }
  .page-body:has(.resume-biography) > *:first-child [class*="col-span"] {
    grid-column: 1 / -1 !important;
  }

  /* Center photo/name/role block */
  .page-body:has(.resume-biography) > *:first-child [class*="col-span-4"] {
    text-align: center !important;
    align-items: center !important;
  }

  /* Bio text — left-aligned */
  .page-body:has(.resume-biography) > *:first-child [class*="col-span-8"] {
    text-align: left !important;
  }

  /* Download CV — styled navy button */
  .page-body:has(.resume-biography) > *:first-child a[href*="uploads"] {
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 0.5rem !important;
    width: 85% !important;
    margin: 0.75rem auto !important;
    padding: 0.6rem 1.5rem !important;
    background-color: #14285A !important;
    color: #fff !important;
    border-radius: 8px !important;
    font-weight: 600 !important;
    text-decoration: none !important;
    transition: background 0.2s ease !important;
  }
  .page-body:has(.resume-biography) > *:first-child a[href*="uploads"]:hover {
    background-color: #6B4FBB !important;
  }

  /* Hide education and interests in sidebar — JS moves them to right */
  .page-body > *:first-child .bio-edu,
  .page-body > *:first-child .bio-interests {
    display: none !important;
  }

  /* ── Right content ── */
  .page-body:has(.resume-biography) > *:not(:first-child) {
    grid-column: 2 !important;
    padding-left: 2rem !important;
    padding-right: 2rem !important;
  }

  .page-body:has(.resume-biography) > *:not(:first-child) h2 {
    text-align: center !important;
    color: #14285A !important;
    margin-bottom: 1.5rem !important;
  }

  .page-body:has(.resume-biography) > section:not(:first-child) {
    padding-top: 2rem !important;
    padding-bottom: 2rem !important;
  }

  .moved-section {
    padding: 2rem !important;
  }
  .moved-section h3 {
    text-align: center !important;
    color: #14285A !important;
    font-size: 1.5rem !important;
    margin-bottom: 1.5rem !important;
  }
}

/* ========================
   GLOBAL TYPOGRAPHY
   ======================== */
body {
  font-size: 1.1rem !important;
  line-height: 1.8 !important;
  letter-spacing: 0.01em !important;
}

h2, .text-3xl {
  font-size: 1.85rem !important;
  font-weight: 700 !important;
  letter-spacing: -0.02em !important;
}

h3, .text-2xl {
  font-size: 1.3rem !important;
  font-weight: 600 !important;
}

.citation, [class*="citation"] {
  font-size: 1.1rem !important;
  line-height: 1.75 !important;
}

.article-grid p, [class*="article-grid"] p {
  font-size: 1rem !important;
  line-height: 1.65 !important;
}

.resume-experience, [class*="resume-experience"] {
  font-size: 1.1rem !important;
  line-height: 1.75 !important;
}

.bio-interests span,
.moved-section span[class*="rounded-full"],
.resume-biography .flex-wrap span {
  font-size: 1rem !important;
}

/* Name — global (overridden in sidebar media query) */
.resume-biography h1, .resume-biography .text-4xl {
  font-size: 2.4rem !important;
  font-weight: 800 !important;
  letter-spacing: -0.02em !important;
}

.resume-biography h2, .resume-biography .text-xl {
  font-size: 1.2rem !important;
  font-weight: 500 !important;
}

.resume-biography .text-gray-500, .resume-biography .dark\:text-gray-400 {
  font-size: 1.05rem !important;
}

nav a, .navbar a {
  font-size: 1.05rem !important;
  font-weight: 500 !important;
  letter-spacing: 0.01em !important;
}

/* ========================
   GLOBAL SPACING
   ======================== */
.hbb-section {
  padding-top: 2.5rem !important;
  padding-bottom: 2.5rem !important;
}

.page-body:not(:has(.resume-biography)) {
  max-width: 1100px !important;
  margin: 0 auto !important;
  padding: 0 2rem !important;
}

.page-body:not(:has(.resume-biography)) h1 {
  font-size: 2rem !important;
  color: #14285A !important;
  margin-bottom: 1.5rem !important;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (window.innerWidth < 1024) return;

  var bio = document.querySelector('.resume-biography');
  if (!bio) return;

  // Find Education and Interests by their h3 headings
  var headings = bio.querySelectorAll('h3');
  var eduSection = null;
  var intSection = null;

  headings.forEach(function (h) {
    var text = h.textContent.trim();
    var el = h.parentElement;
    while (el && el !== bio && !el.classList.contains('mb-16')) {
      el = el.parentElement;
    }
    if (!el || el === bio) el = h.parentElement.parentElement;

    if (text === 'Education') eduSection = el;
    else if (text === 'Interests') intSection = el;
  });

  // Tag for CSS hiding
  if (eduSection) eduSection.classList.add('bio-edu');
  if (intSection) intSection.classList.add('bio-interests');

  var pageBody = document.querySelector('.page-body');
  if (!pageBody) return;

  // Clone and move to right content area
  [eduSection, intSection].forEach(function (src) {
    if (!src) return;
    var wrapper = document.createElement('section');
    wrapper.className = 'moved-section hbb-section';
    wrapper.style.gridColumn = '2';
    var inner = src.cloneNode(true);
    inner.classList.remove('bio-edu', 'bio-interests');
    inner.style.display = '';
    var container = document.createElement('div');
    container.className = 'max-w-5xl mx-auto px-4';
    container.appendChild(inner);
    wrapper.appendChild(container);
    pageBody.appendChild(wrapper);
  });
});
</script>
