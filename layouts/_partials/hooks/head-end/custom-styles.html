<style>
/* ========================
   COLOR PALETTE
   ======================== */
:root {
  --color-primary: #14285A;
  --color-secondary: #6B4FBB;
}

.navbar {
  background-color: #14285A !important;
}

.navbar-brand, .nav-link {
  color: #ffffff !important;
}

a {
  color: #6B4FBB;
}

a:hover {
  color: #14285A;
}

.card-simple:hover {
  border-color: #6B4FBB;
}

.section-heading h1 {
  color: #14285A;
}

.btn-primary {
  background-color: #14285A;
  border-color: #14285A;
}

.btn-primary:hover {
  background-color: #6B4FBB;
  border-color: #6B4FBB;
}

/* ========================
   SIDEBAR LAYOUT (desktop)
   ======================== */
@media (min-width: 1024px) {

  /* Page body becomes a CSS grid: 40% bio | 60% content */
  .page-body {
    display: grid !important;
    grid-template-columns: 40% 1fr !important;
    align-items: start !important;
    gap: 0 !important;
  }

  /* Left sidebar — sticky, NO scroll */
  .page-body > *:first-child {
    position: sticky !important;
    top: 52px !important;
    max-height: calc(100vh - 52px) !important;
    overflow: hidden !important;
    border-right: 1px solid rgba(148, 163, 184, 0.2) !important;
    grid-column: 1 !important;
    grid-row: 1 / span 999 !important;
  }

  /* All other sections stack in column 2 */
  .page-body > *:not(:first-child) {
    grid-column: 2 !important;
  }

  /* Reduce large vertical padding inside the sidebar bio */
  .page-body > *:first-child .resume-biography {
    padding-top: 1.5rem !important;
    padding-bottom: 1rem !important;
  }

  /* Force single-column layout inside biography inner grid */
  .page-body > *:first-child .resume-biography > div > div {
    grid-template-columns: 1fr !important;
    gap: 1rem !important;
  }

  /* Both inner biography columns become full width */
  .page-body > *:first-child [class*="col-span"] {
    grid-column: 1 / -1 !important;
  }

  /* Hide education and interests inside sidebar — JS will move them to right */
  .page-body > *:first-child .bio-edu,
  .page-body > *:first-child .bio-interests {
    display: none !important;
  }

  /* Moved sections styling on right side */
  .moved-section {
    padding: 3rem 2rem;
  }

  .moved-section h3 {
    margin-bottom: 1.5rem;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (window.innerWidth < 1024) return;

  var bio = document.querySelector('.resume-biography');
  if (!bio) return;

  // Find Education and Interests sections by their h3 headings
  var headings = bio.querySelectorAll('h3');
  var eduSection = null;
  var intSection = null;

  headings.forEach(function (h) {
    var text = h.textContent.trim();
    var container = h.closest('.mb-16') || h.parentElement.parentElement;
    if (text === 'Education') {
      eduSection = container;
    } else if (text === 'Interests') {
      intSection = container;
    }
  });

  // Tag them so CSS can hide them in sidebar
  if (eduSection) eduSection.classList.add('bio-edu');
  if (intSection) intSection.classList.add('bio-interests');

  // Find the right-side content area (page-body children after the first)
  var pageBody = document.querySelector('.page-body');
  if (!pageBody) return;

  // Move education and interests to end of right-side content
  if (eduSection) {
    var eduWrapper = document.createElement('section');
    eduWrapper.className = 'moved-section';
    eduWrapper.style.cssText = 'padding:3rem 2rem;';
    eduWrapper.innerHTML = '<div class="max-w-5xl mx-auto">' + eduSection.outerHTML + '</div>';
    // Remove hidden class on the cloned version
    eduWrapper.querySelector('.bio-edu').classList.remove('bio-edu');
    pageBody.appendChild(eduWrapper);
  }

  if (intSection) {
    var intWrapper = document.createElement('section');
    intWrapper.className = 'moved-section';
    intWrapper.style.cssText = 'padding:3rem 2rem;';
    intWrapper.innerHTML = '<div class="max-w-5xl mx-auto">' + intSection.outerHTML + '</div>';
    intWrapper.querySelector('.bio-interests').classList.remove('bio-interests');
    pageBody.appendChild(intWrapper);
  }
});
</script>
