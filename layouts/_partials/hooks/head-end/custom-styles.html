<style>
/* ========================
   COLOR PALETTE
   ======================== */
a { color: #6B4FBB; }
a:hover { color: #14285A; }
.btn-primary { background-color: #14285A; border-color: #14285A; }
.btn-primary:hover { background-color: #6B4FBB; border-color: #6B4FBB; }

/* ========================
   SIDEBAR LAYOUT — homepage only
   Scoped via :has(.resume-biography) so inner pages are untouched
   ======================== */
@media (min-width: 1024px) {

  /* Only apply grid when biography section exists (homepage) */
  .page-body:has(.resume-biography) {
    display: grid !important;
    grid-template-columns: 32% 1fr !important;
    align-items: start !important;
    gap: 0 !important;
  }

  /* ── Left sidebar ── */
  .page-body:has(.resume-biography) > *:first-child {
    position: sticky !important;
    top: 52px !important;
    max-height: calc(100vh - 52px) !important;
    overflow-y: auto !important;
    scrollbar-width: none !important;
    grid-column: 1 !important;
    grid-row: 1 / span 999 !important;
    background: transparent !important;
  }
  /* Hide scrollbar */
  .page-body:has(.resume-biography) > *:first-child::-webkit-scrollbar {
    display: none !important;
  }

  /* Kill gradient bg */
  .page-body:has(.resume-biography) > *:first-child .hbx-bg-gradient,
  .page-body:has(.resume-biography) > *:first-child.hbx-bg-gradient {
    background: none !important;
    background-image: none !important;
  }
  .page-body:has(.resume-biography) > *:first-child .home-section-bg {
    display: none !important;
  }

  /* Sidebar inner padding */
  .page-body:has(.resume-biography) > *:first-child .resume-biography {
    padding: 1.5rem 2rem 1rem 2rem !important;
  }

  /* Force single column inside bio grid */
  .page-body:has(.resume-biography) > *:first-child .resume-biography > div > div {
    grid-template-columns: 1fr !important;
    gap: 0.5rem !important;
  }
  .page-body:has(.resume-biography) > *:first-child [class*="col-span"] {
    grid-column: 1 / -1 !important;
  }

  /* Center photo/name/role block */
  .page-body:has(.resume-biography) > *:first-child [class*="col-span-4"] {
    text-align: center !important;
    align-items: center !important;
  }

  /* Bio text block — left-aligned, readable */
  .page-body:has(.resume-biography) > *:first-child [class*="col-span-8"] {
    text-align: left !important;
    padding: 0 0.5rem !important;
  }
  .page-body:has(.resume-biography) > *:first-child [class*="col-span-8"] .prose {
    font-size: 1rem !important;
    line-height: 1.7 !important;
  }

  /* Download CV — styled navy button */
  .page-body:has(.resume-biography) > *:first-child a[href*="uploads"] {
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 0.5rem !important;
    width: 85% !important;
    margin: 0.75rem auto !important;
    padding: 0.6rem 1.2rem !important;
    background-color: #14285A !important;
    color: #fff !important;
    border-radius: 8px !important;
    font-weight: 600 !important;
    font-size: 0.9rem !important;
    text-decoration: none !important;
  }
  .page-body:has(.resume-biography) > *:first-child a[href*="uploads"]:hover {
    background-color: #6B4FBB !important;
  }

  /* Hide education and interests in sidebar — JS moves them to right */
  .page-body > *:first-child .bio-edu,
  .page-body > *:first-child .bio-interests {
    display: none !important;
  }

  /* ── Right content ── */
  .page-body:has(.resume-biography) > *:not(:first-child) {
    grid-column: 2 !important;
    padding-left: 2rem !important;
    padding-right: 2rem !important;
  }

  /* Right-side section headings — centered */
  .page-body:has(.resume-biography) > *:not(:first-child) h2 {
    text-align: center !important;
    color: #14285A !important;
    margin-bottom: 1.5rem !important;
  }

  /* Reduce section vertical padding */
  .page-body:has(.resume-biography) > section:not(:first-child) {
    padding-top: 2rem !important;
    padding-bottom: 2rem !important;
  }

  /* Moved sections (edu/interests) */
  .moved-section {
    padding: 2rem !important;
  }
  .moved-section h3 {
    text-align: center !important;
    color: #14285A !important;
    font-size: 1.5rem !important;
    margin-bottom: 1.5rem !important;
  }
}

/* ========================
   GLOBAL TYPOGRAPHY — balanced readable sizes
   ======================== */

/* Base body text */
body {
  font-size: 1.05rem !important;
  line-height: 1.75 !important;
}

/* Section headings (Publications, Projects, etc.) */
h2, .text-3xl {
  font-size: 1.75rem !important;
}

/* Sub-headings (project titles, experience titles) */
h3, .text-2xl {
  font-size: 1.25rem !important;
}

/* Publication citations — slightly larger for readability */
.citation, [class*="citation"] {
  font-size: 1.05rem !important;
  line-height: 1.7 !important;
}

/* Project card text */
.article-grid p, [class*="article-grid"] p {
  font-size: 0.95rem !important;
  line-height: 1.6 !important;
}

/* Experience block text */
.resume-experience, [class*="resume-experience"] {
  font-size: 1.05rem !important;
  line-height: 1.7 !important;
}

/* Interest tags */
.bio-interests span, [class*="rounded-full"] {
  font-size: 0.95rem !important;
}

/* Name on sidebar */
.resume-biography h1, .resume-biography .text-4xl {
  font-size: 2.2rem !important;
}

/* Role text */
.resume-biography h2, .resume-biography .text-xl {
  font-size: 1.15rem !important;
}

/* Navbar links */
nav a, .navbar a {
  font-size: 1rem !important;
}

/* ========================
   GLOBAL SPACING — balanced whitespace
   ======================== */
.hbb-section {
  padding-top: 2.5rem !important;
  padding-bottom: 2.5rem !important;
}

/* Inner pages — comfortable max-width and padding */
.page-body:not(:has(.resume-biography)) {
  max-width: 1100px !important;
  margin: 0 auto !important;
  padding: 0 2rem !important;
}

.page-body:not(:has(.resume-biography)) h1 {
  font-size: 2rem !important;
  color: #14285A !important;
  margin-bottom: 1.5rem !important;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (window.innerWidth < 1024) return;

  var bio = document.querySelector('.resume-biography');
  if (!bio) return;

  // Find Education and Interests by their h3 headings
  var headings = bio.querySelectorAll('h3');
  var eduSection = null;
  var intSection = null;

  headings.forEach(function (h) {
    var text = h.textContent.trim();
    // Walk up to find the container div (mb-16 or similar)
    var el = h.parentElement;
    while (el && el !== bio && !el.classList.contains('mb-16')) {
      el = el.parentElement;
    }
    if (!el || el === bio) el = h.parentElement.parentElement;

    if (text === 'Education') eduSection = el;
    else if (text === 'Interests') intSection = el;
  });

  // Tag for CSS hiding
  if (eduSection) eduSection.classList.add('bio-edu');
  if (intSection) intSection.classList.add('bio-interests');

  var pageBody = document.querySelector('.page-body');
  if (!pageBody) return;

  // Clone and move to right content area
  [eduSection, intSection].forEach(function (src) {
    if (!src) return;
    var wrapper = document.createElement('section');
    wrapper.className = 'moved-section hbb-section';
    wrapper.style.gridColumn = '2';
    var inner = src.cloneNode(true);
    inner.classList.remove('bio-edu', 'bio-interests');
    inner.style.display = '';
    var container = document.createElement('div');
    container.className = 'max-w-5xl mx-auto px-4';
    container.appendChild(inner);
    wrapper.appendChild(container);
    pageBody.appendChild(wrapper);
  });
});
</script>
